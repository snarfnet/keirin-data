name: Daily Scrape

on:
  schedule:
    # 07:10 JST = 22:10 UTC (morning refresh for today's races)
    - cron: '10 22 * * *'
    # 09:10 JST = 00:10 UTC (late morning retry)
    - cron: '10 0 * * *'
    # 19:00 JST = 10:00 UTC (entries for tomorrow)
    - cron: '0 10 * * *'
    # 21:00 JST = 12:00 UTC (odds + results)
    - cron: '0 12 * * *'
    # 23:30 JST = 14:30 UTC (late retry for tomorrow's entries)
    - cron: '30 14 * * *'
    # 00:30 JST = 15:30 UTC (midnight retry when tomorrow becomes today)
    - cron: '30 15 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-scrape
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright pandas
          playwright install chromium

      - name: Scrape entries (today + tomorrow)
        run: |
          cd scripts
          mkdir -p data
          python -u ensure_entries.py 1
        working-directory: .

      - name: Scrape odds
        run: |
          cd scripts
          mkdir -p data
          python scrape_odds.py
          python publish_if_valid.py odds
        working-directory: .
        continue-on-error: true

      - name: Generate results
        run: |
          cd scripts
          mkdir -p data
          RESULT_DATE=$(python -c "from datetime import datetime, timedelta; from zoneinfo import ZoneInfo; now=datetime.now(ZoneInfo('Asia/Tokyo')); target=now if now.hour >= 21 else now - timedelta(days=1); print(target.strftime('%Y%m%d'))")
          python scraper.py "$RESULT_DATE" "$RESULT_DATE"
          python scrape_results.py "$RESULT_DATE"
          python publish_if_valid.py results
        working-directory: .
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.json
          git diff --cached --quiet || git commit -m "Auto-update: $(date -u +%Y%m%d-%H%M)"
          git push

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
